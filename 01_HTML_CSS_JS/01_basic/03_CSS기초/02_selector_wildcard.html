<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>

    <style>
      * {
        color: red;
      }

      /* 태그 선택자 */
      h1 {
        color: blue;
      }

      /* 
        클래스 선택자
        - 여러 클래스를 한번에 적용할 수 있다
      */
      .select {
        color: black;
      }

      .item {
        background-color: blueviolet;
      }

      /* id 선택자 */
      #banana {
        color: aqua;
      }

      #bana {
        background-color: olive;
      }
    </style>
  </head>
  <body>
    <!--
        전체 선택자 (*) - 모든 요소를 선택
    -->
    <h1>제목 글자</h1>
    <p>
      Lorem ipsum dolor sit, amet consectetur adipisicing elit. Laborum, sed
      impedit aperiam ex aliquam eaque odit, incidunt dicta optio aut
      accusantium culpa dolorum consequuntur amet sunt repellendus inventore
      accusamus perferendis.
    </p>
    ul>(li.select)*4
    <ul>
      <li>사과</li>
      <li id="banana bana" class="select">바나나</li>
      <li>오렌지</li>
      <li class="select">감</li>
    </ul>
  </body>
</html>
