<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      let date = new Date();
      let h = date.getHours();

      if (h < 5) {
        alert('잠을 자렴...');
      } else if (h < 7) {
        alert('준비');
      } else if (h < 9) {
        alert('출근');
      } else if (h < 12) {
        alert('빈둥빈둥');
      } else if (h < 14) {
        alert('식사');
      } else {
        alert('여러 가지 업무를 수행합니다.');
      }
    </script>
  </head>

  <body></body>
</html>
