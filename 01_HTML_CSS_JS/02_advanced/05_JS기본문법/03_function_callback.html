<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      function callNTimes(callback, n) {
        for (let i = 0; i < n; i++) {
          callback();
        }
      }

      let func = function () {
        alert('함수 호출');
      };

      callNTimes(func, 3);
    </script>
  </head>

  <body></body>
</html>
