<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vue 3 연습용 Composition</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  </head>
  <body>
    <div id="app"></div>

    <script>
      const { createApp } = Vue;

      createApp({
        setup() {
          // Composition 함수에서는 created()의 역항르 setup() 함수가 대신함.
          const normalMessage = '일반 메시지 입니다.';

          // ref(): 반응형 데이터를 만들기 위한 레퍼 함수
          const message = ref('안녕하세요 Vue!');
          const currentTime = ref(new Date.LocaleTimeString());

          // 컴포넌트가 마운트 됐을 때
          onMounted(() => {
            // ref로 래핑된 데이터에 접근하려면 .value 사용
            setInterval(() => {
              currentTime.value = new Date().toLocaleTimeString();
            }, 1000);
          });

          return {
            normalMessage,
            message,
            currentTime,
          };
        },
      }).mount('#app');
    </script>
  </body>
</html>
