<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fullstack Study</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    />

    <style>
      .jumbotron-bg {
        background:
          linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)),
          url('https://images.unsplash.com/photo-1448375240586-882707db888b?ixlib=rb-4.0.3&auto=format&fit=crop&w=1200&q=80')
            center/cover no-repeat;
        color: white;
        padding: 4rem 0;
      }

      .table th {
        border-top: 2px solid #333;
        border-bottom: 2px solid #333;
      }
      .table td {
        border-bottom: 1px solid #ddd;
      }

      .table a {
        color: #0d6efd;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div class="jumbotron-bg">
        <div class="container">
          <h1 class="display-5 fw-bold mb-3">Fullstack Study</h1>
          <p class="fs-6 text-light">
            Vue + 자바 기반의 풀스택 기술을 배웁니다.
          </p>
        </div>
      </div>

      <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
          <a class="navbar-brand fw-bold" href="#">
            <i class="fas fa-home"></i> Fullstack
          </a>
          <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarNav"
            aria-controls="navbarNav"
            aria-expanded="false"
            aria-label="Toggle navigation"
          >
            <span class="navbar-toggler-icon"></span>
          </button>

          <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
              <li class="nav-item">
                <a class="nav-link text-white-50" href="#">메뉴1</a>
              </li>
              <li class="nav-item">
                <a class="nav-link text-white-50" href="#">메뉴2</a>
              </li>
              <li class="nav-item">
                <a class="nav-link text-white-50" href="#">메뉴3</a>
              </li>
            </ul>
            <ul class="navbar-nav">
              <li class="nav-item">
                <a class="nav-link text-white" href="#"
                  ><i class="fas fa-user-circle"></i> admin</a
                >
              </li>
              <li class="nav-item">
                <a class="nav-link text-white" href="#"
                  ><i class="fas fa-sign-out-alt"></i> 로그아웃</a
                >
              </li>
            </ul>
          </div>
        </div>
      </nav>

      <div class="container mt-5">
        <h3 class="mb-4 fw-bold"><i class="fas fa-list"></i> 글 목록</h3>

        <div class="table-responsive">
          <table class="table text-center align-middle">
            <thead>
              <tr>
                <th scope="col" style="width: 10%">No</th>
                <th scope="col" class="text-start" style="width: 50%">제목</th>
                <th scope="col" style="width: 20%">작성자</th>
                <th scope="col" style="width: 20%">등록일</th>
              </tr>
            </thead>
            <tbody>
              <tr v-for="post in posts" :key="post.no">
                <td>{{ post.no }}</td>
                <td class="text-start">
                  <a href="#" class="text-decoration-none">{{ post.title }}</a>
                </td>
                <td>{{ post.author }}</td>
                <td>{{ post.date }}</td>
              </tr>
            </tbody>
          </table>
        </div>

        <div class="position-relative d-flex justify-content-center mt-4">
          <nav aria-label="Page navigation">
            <ul class="pagination mb-0">
              <li class="page-item">
                <a class="page-link" href="#"
                  ><i class="fas fa-step-backward"></i
                ></a>
              </li>
              <li class="page-item">
                <a class="page-link" href="#"
                  ><i class="fas fa-chevron-left"></i
                ></a>
              </li>
              <li class="page-item"><a class="page-link" href="#">6</a></li>
              <li class="page-item"><a class="page-link" href="#">7</a></li>
              <li class="page-item"><a class="page-link" href="#">8</a></li>
              <li class="page-item active">
                <a class="page-link" href="#">9</a>
              </li>
              <li class="page-item"><a class="page-link" href="#">10</a></li>
              <li class="page-item">
                <a class="page-link" href="#"
                  ><i class="fas fa-chevron-right"></i
                ></a>
              </li>
              <li class="page-item">
                <a class="page-link" href="#"
                  ><i class="fas fa-step-forward"></i
                ></a>
              </li>
            </ul>
          </nav>
          <div class="position-absolute end-0">
            <button class="btn btn-primary">
              <i class="fas fa-edit"></i> 글쓰기
            </button>
          </div>
        </div>

        <footer class="text-center mt-5 mb-4 text-secondary">
          <small>&copy; 2024.05 created by fullstack</small>
        </footer>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script>
      const { createApp } = Vue;

      createApp({
        data() {
          return {
            posts: [
              {
                no: 1,
                title: '글 제목 1',
                author: 'user01',
                date: '2024-04-17',
              },
              {
                no: 2,
                title: '글 제목 2',
                author: 'user01',
                date: '2024-04-17',
              },
              {
                no: 3,
                title: '글 제목 3',
                author: 'user01',
                date: '2024-04-17',
              },
              {
                no: 4,
                title: '글 제목 4',
                author: 'user01',
                date: '2024-04-17',
              },
              {
                no: 5,
                title: '글 제목 5',
                author: 'user01',
                date: '2024-04-17',
              },
            ],
          };
        },
      }).mount('#app');
    </script>
  </body>
</html>
